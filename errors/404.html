<!doctype html>
<html lang="en" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Not Found | {{ config.site.title }}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        />
        <script>
            // Cek dark mode biar konsisten sama main theme
            if (localStorage.getItem("dark") === "true") {
                document.documentElement.classList.add("dark");
            }
        </script>
        <style>
            [x-cloak] {
                display: none !important;
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            @keyframes float {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-20px);
                }
                100% {
                    transform: translateY(0px);
                }
            }
        </style>
    </head>
    <body
        class="bg-gray-50 dark:bg-[#121212] text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-6"
    >
        <div class="max-w-2xl w-full text-center">
            <div class="relative mb-12">
                <div class="animate-float">
                    <i
                        class="bx bx-ghost text-[120px] sm:text-[180px] text-blue-600/20 dark:text-blue-400/10"
                    ></i>
                </div>
                <h1
                    class="absolute inset-0 flex items-center justify-center text-7xl sm:text-9xl font-black tracking-tighter text-blue-600 dark:text-blue-500 opacity-90"
                >
                    404
                </h1>
            </div>

            <div class="space-y-6">
                <h2 class="text-3xl sm:text-4xl font-bold tracking-tight">
                    Oops! You've drifted into
                    <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600"
                        >void.</span
                    >
                </h2>
                <p
                    class="text-gray-500 dark:text-gray-400 text-lg max-w-md mx-auto leading-relaxed"
                >
                    Halaman yang Abang cari kaga ada di sirkuit Monpyra. Mungkin
                    udah pindah alamat atau emang lagi mau sendiri.
                </p>

                <div
                    class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-8"
                >
                    <a
                        href="{{ base_url }}/"
                        class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg shadow-blue-500/30 transition-all duration-300 hover:-translate-y-1 flex items-center gap-2 w-full sm:w-auto justify-center"
                    >
                        <i class="bx bx-home-alt"></i> Back to Home
                    </a>
                    <button
                        onclick="window.history.back()"
                        class="px-8 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 font-bold rounded-full transition-all duration-300 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-2 w-full sm:w-auto justify-center"
                    >
                        <i class="bx bx-left-arrow-alt"></i> Go Back
                    </button>
                </div>
            </div>

            <div
                class="mt-20 pt-8 border-t border-gray-200 dark:border-gray-800"
            >
                <p class="text-sm text-gray-400">
                    Report this issue?
                    <a
                        href="{{ config.site.repository }}"
                        class="text-blue-500 hover:underline"
                        >Open a Ticket</a
                    >
                </p>
            </div>
        </div>
    </body>
</html>
